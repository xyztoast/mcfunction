<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://xyztoast.github.io/mcfunction/theme/site.css">
<title>mcbCode</title>
<style>
  body {
    background: #0c0c0c;
    color: #ffffff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    user-select: none;
    flex-direction: column;
    padding: 1rem;
  }

  h1 {
    margin-bottom: 2rem;
    font-weight: normal;
  }

  g {
      color: #05ee93;
  }

  .upload-container {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  #fileInput {
    display: none;
  }

  .upload-btn {
    display: inline-block;
    padding: 2rem 4rem;
    background: #454545;
    color: #ffffff;
    font-size: 1.5rem;
    font-weight: bold;
    border-radius: 1rem;
    cursor: pointer;
    transition: box-shadow 0.2s ease;
  }

  .upload-btn:hover {
    box-shadow: 0 0 20px #ffffff66;
  }

  #fileName {
    display: block;
    margin-top: 1rem;
    font-size: 1rem;
    color: #ccc;
  }

  #editor {
    width: 90%;
    height: 50vh;
    background: #323738;
    color: #00b2ff;
    border: 1px solid #00b2ff;
    padding: 1rem;
    border-radius: 0.5rem;
    font-family: monospace;
    font-size: 1rem;
    resize: vertical;
    outline: none;
  }

  #saveBtn {
    margin-top: 1rem;
    padding: 1rem 2rem;
    background: #00b2ff;
    color: #212425;
    border: none;
    border-radius: 0.8rem;
    font-size: 1.2rem;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  #saveBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00b2ff66;
  }
</style>
</head>
<body>
<h1>mcb<g>Code</g> file upload</h1>

<div class="upload-container">
  <input type="file" id="fileInput" accept=".mcfunction">
  <label for="fileInput" class="upload-btn">Upload .mcfunction</label>
  <span id="fileName">no file selected</span>
</div>


<script>
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const editor = document.getElementById('editor');
  const saveBtn = document.getElementById('saveBtn');

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) {
      fileName.textContent = 'no file selected';
      editor.value = '';
      return;
    }
    fileName.textContent = file.name;
    const reader = new FileReader();
    reader.onload = () => editor.value = reader.result;
    reader.readAsText(file);
  });

  saveBtn.addEventListener('click', () => {
    const blob = new Blob([editor.value], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileInput.files[0] ? fileInput.files[0].name : 'edited.mcfunction';
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
