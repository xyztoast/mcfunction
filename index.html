<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="https://xyztoast.github.io/mcfunction/theme/site.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>mcbCode</title>
  <style>
    html,body{
      min-height:100%;
      margin:0;
      font-family:'mcfont', sans-serif;
      background:#0c0c0c;
      font-weight: 0;
      color:#bebebe;
      justify-content: center;
      margin: auto;
      text-align: center;
    }

    h1{

      font-family: "mcfontb", sans-serif;
      font-size: 40px;
      margin-top: 20vh;
      color: #ffffff;
      text-align: center;
    }
    
    h2 {
     font-size: 25px; 
    }
    
  .mcbc {
    position: fixed;
    left: 5px;
    top: 10px;
    height: 50px;
    width: 50px;
  }
  
  g {
      color: #05ee93;
  }
  
  c {
      color: #e7007b;
      background-color: #212121;
      border-radius: 12px;
      padding: 6px 6px;
  }
  
  button {
      text-align: center;
      background-color: #313131;
      border: none;
      font-size: 18px;
      border-radius: 12px;
      padding: 8px 12px;
      color: #ffffff;
      transition: color 0.2s ease-in-out
  }
  
  button:hover {
      color: #05ee93;
  }
  </style>
</head>
<body>
<h1>mcb<g>Code</g></h1>
<p style="color: #fff;">The <g>first</g> exclusively Minecraft Bedrock <c>.mcfunction</c> code editor</p>
<div class="top-navi">
    <button href="https://xyztoast.github.io/mcfunction/editor">Try it out</button>
    <button>Documentation</button>
</div>

<script data-goatcounter="https://idktoast.goatcounter.com/count"
