<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://xyztoast.github.io/mcfunction/theme/site.css">
  <style>
body {
  background: #0c0c0c;
  color: #ffffff;
  font-family: sans-serif;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow-x: hidden;
}

g {
  color: #05ee93;
  transition: color 0.2s ease-in-out;
}

header {
  padding: 20px 40px;
  flex-shrink: 0;
}

#chat-messages {
  flex-grow: 1;
  overflow-y: auto;
  padding: 20px 40px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding-bottom: 180px; 
}

@keyframes messageFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes letterFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.message-container {
  display: flex;
  flex-direction: column;
  max-width: 75%;
  animation: messageFadeIn 0.2s ease-in-out forwards;
}

.user-container {
  align-self: flex-end;
  align-items: flex-end;
}

.bot-container {
  align-self: flex-start;
  align-items: flex-start;
  max-width: 90%;
}

.message {
  padding: 12px 18px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: 'mcfont', sans-serif;
}

.message-meta {
  font-size: 10px;
  opacity: 0; 
  margin-top: 4px;
  text-transform: capitalize;
  color: #888888; 
  font-family: 'mcfont', sans-serif;
  transition: opacity 0.2s ease-in-out;
}

.message-container:hover .message-meta {
  opacity: 0.6;
}

.user-message {
  background: #1e1e1e;
  border-right: 4px solid #05ee93;
  border-top: 1px solid #383838;
  border-bottom: 1px solid #383838;
  border-left: 1px solid #383838;
}

.bot-message {
  background: transparent;
  padding: 12px 0;
  color: #bebebe;
  border: none;
}

.char {
  display: inline;
  opacity: 0;
  animation: letterFadeIn 0.1s ease forwards;
}

.prompt-wrapper {
  position: fixed;
  bottom: 20px; 
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 1000; 
  padding: 0 20px;
  box-sizing: border-box;
  pointer-events: none;
}

.input-container {
  pointer-events: auto;
  position: relative;
  width: 100%;
  max-width: 1200px; 
  background-color: rgba(69, 69, 69, 0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid #383838;
  border-radius: 0;
  display: flex;
  flex-direction: column;
  overflow: visible; 
  transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
}

.prompt {
  width: 100%;
  min-height: 80px;
  max-height: 400px;
  background: transparent;
  border: none;
  outline: none;
  color: #ffffff; 
  font-family: 'mcfont', sans-serif;
  padding: 15px;
  padding-bottom: 45px; 
  resize: none;
  box-sizing: border-box;
  overflow-y: hidden;
  display: block;
}

.disclaimer {
  font-size: 10px;
  color: #666666;
  margin-top: 8px;
  font-family: 'mcfont', sans-serif;
  text-align: center;
}

.left-button-group {
  position: absolute;
  bottom: 8px;
  left: 12px;
  display: flex;
  align-items: center;
}

.right-button-group {
  position: absolute;
  bottom: 8px;
  right: 12px;
  display: flex;
  align-items: center;
}

.dropup-container {
  position: relative;
  display: inline-block;
}

.dropup-content {
  display: none; 
  position: absolute;
  bottom: 100%;
  left: 0;
  background-color: #2a2a2a;
  border: 1px solid #383838;
  min-width: 160px; 
  z-index: 1001;
  margin-bottom: 12px; 
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.dropup-content.show { display: block; }
.dropup-content.visible { opacity: 1; transform: translateY(0); }

.dropup-item {
  padding: 14px 20px; 
  cursor: pointer;
  font-family: 'mcfont', sans-serif;
  font-size: 14px; 
  color: #bebebe;
  transition: background 0.2s, color 0.2s;
}

.dropup-item:hover { background-color: #383838; }
.dropup-item.active { color: #05ee93; }

.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #bebebe;
  font-family: 'mcfont', sans-serif;
  padding: 5px 10px;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s ease-in-out;
}

.icon-btn:hover:not(:disabled) { color: #05ee93; }
.icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.input-container:hover {
  border-color: #05ee93;
  box-shadow: 0 0 15px rgba(5, 238, 147, 0.4);
}

::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: #0c0c0c; }
::-webkit-scrollbar-thumb {
  background: #383838;
  border: 2px solid #0c0c0c;
}
::-webkit-scrollbar-thumb:hover { background: #05ee93; }

.typing-indicator {
  color: #666;
  font-size: 12px;
  margin-bottom: 10px;
  font-family: 'mcfont', sans-serif;
  display: none;
}

.error-text {
  color: #ff5555;
  font-style: italic;
}
  </style>
</head>
<body>
  <header>
    <h1><g>Allay</g>AI</h1>
  </header>

  <div id="chat-messages"></div>

<div class="prompt-wrapper">
  <div id="typing-status" class="typing-indicator">Allay is thinking...</div>
  <div class="input-container">
    <textarea 
      id="chat-input"
      class="prompt" 
      placeholder="For some reason, this execute command isn't..."
    ></textarea>
    
    <div class="left-button-group">
      <div class="dropup-container">
        <button class="icon-btn" id="mode-btn">Redstone</button>
        <div class="dropup-content" id="mode-menu">
          <div class="dropup-item active" data-mode="redstone">Redstone</div>
          <div class="dropup-item" data-mode="observer">Observer</div>
        </div>
      </div>
    </div>

    <div class="right-button-group">
      <button class="icon-btn send-btn" id="send-btn">Send</button>
    </div>
  </div>
  <div class="disclaimer">AllayAI is artificial intelligence. It might make mistakes.</div>
</div>

<script>
  // STEP 1: MAKE SURE THIS LINK IS CORRECT
  // It should look like: https://your-project.vercel.app/api/send
  const workerUrl = "https://allay-proxy.vercel.app/api/send"; 

  const chatInput = document.getElementById('chat-input');
  const chatMessages = document.getElementById('chat-messages');
  const sendBtn = document.getElementById('send-btn');
  const modeBtn = document.getElementById('mode-btn');
  const modeMenu = document.getElementById('mode-menu');
  const modeItems = document.querySelectorAll('.dropup-item');
  const typingStatus = document.getElementById('typing-status');

  let currentMode = 'redstone';
  let isProcessing = false;

  function toggleMenu(show) {
    if (show) {
      modeMenu.classList.add('show');
      setTimeout(() => modeMenu.classList.add('visible'), 10);
    } else {
      modeMenu.classList.remove('visible');
      setTimeout(() => modeMenu.classList.remove('show'), 300);
    }
  }

  modeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMenu(!modeMenu.classList.contains('visible'));
  });

  window.addEventListener('click', () => toggleMenu(false));

  modeItems.forEach(item => {
    item.addEventListener('click', () => {
      modeItems.forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentMode = item.dataset.mode;
      modeBtn.textContent = item.textContent;
      toggleMenu(false);
    });
  });

  function autoGrow() {
    chatInput.style.height = "5px";
    chatInput.style.height = Math.max(80, chatInput.scrollHeight) + "px";
  }

async function callWorker(prompt) {
const contextualPrompt = `${prompt} [${currentMode}]`;
    
    const payload = {
      userPrompt: contextualPrompt
    };

    const response = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    const data = await response.json();

    // Debugging: This will show you the REAL "box" in the browser console
    console.log("OpenRouter Response:", data);

    // This checks all the common places OpenRouter hides the text
    if (data.choices && data.choices[0] && data.choices[0].message) {
        return data.choices[0].message.content;
    } else if (data.choices && data.choices[0] && data.choices[0].text) {
        return data.choices[0].text;
    } else if (data.error) {
        return `OpenRouter Error: ${data.error.message}`;
    }
    
    return "AI reached, but the response format was unexpected. Check Console.";
  }
    
  function typeMessage(text, isError = false) {
    const container = document.createElement('div');
    container.className = 'message-container bot-container';
    
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message bot-message';
    if (isError) msgDiv.classList.add('error-text');
    container.appendChild(msgDiv);
    chatMessages.appendChild(container);

    const cleanText = text.replace(/\*\*/g, '');

    cleanText.split('').forEach((char, index) => {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = char;
      span.style.animationDelay = `${index * 0.005}s`;
      msgDiv.appendChild(span);
    });

    chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });
  }

  async function sendMessage() {
    if (isProcessing) return;
    
    const rawText = chatInput.value.trim();
    if (rawText === "" || workerUrl.includes("REPLACE_WITH")) {
        if(workerUrl.includes("REPLACE_WITH")) {
            typeMessage("Error: Not your fault, this is mcbCode's fault", true);
        }
        return;
    }

    isProcessing = true;
    sendBtn.disabled = true;
    chatInput.disabled = true;

    const container = document.createElement('div');
    container.className = 'message-container user-container';
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message user-message';
    msgDiv.textContent = rawText;
    container.appendChild(msgDiv);
    chatMessages.appendChild(container);
    
    chatInput.value = "";
    autoGrow();
    chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' });

    typingStatus.style.display = 'block';

    try {
      const response = await callWorker(rawText);
      typingStatus.style.display = 'none';
      typeMessage(response);
    } catch (error) {
      typingStatus.style.display = 'none';
      typeMessage(`Water hit the redstone! Error: ${error.message}`, true);
    } finally {
      isProcessing = false;
      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
    }
  }

  chatInput.addEventListener('input', autoGrow);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);
</script>

</body>
</html>
